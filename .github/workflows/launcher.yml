# Launcher CI -- build + test the launcher/ Rust crate on both targets.
#
# Two matrix arms:
#   windows-latest / x86_64-pc-windows-msvc  -- CRT-static build (via launcher/.cargo/config.toml)
#   ubuntu-latest  / x86_64-unknown-linux-musl -- fully static binary; verified with `file` + `ldd`
#
# `working-directory: launcher` means all cargo commands run from inside launcher/,
# so launcher/.cargo/config.toml (+crt-static target cfg) is auto-discovered on Windows
# and relative target/ paths in the static-verify step resolve under launcher/.
#
# All actions SHA-pinned to commit SHAs per sha_pinning_required enforcement.
# Comments are precise (# vX.Y.Z) to keep Dependabot's github-actions ecosystem
# tracking aligned (bare-major comments are a documented Dependabot blind spot).

name: launcher

on:
  # build-and-test is a REQUIRED status check on master. A required check must
  # report on every PR, or GitHub blocks the PR "waiting for status" — so the
  # pull_request trigger runs on ALL PRs (no paths filter). The push trigger
  # stays path-filtered for master-push efficiency.
  push:
    paths:
      - 'launcher/**'
      - '.github/workflows/launcher.yml'
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: launcher
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # rustup is preinstalled on GitHub-hosted runners; set the toolchain
      # directly rather than via a toolchain action, because the repo's Actions
      # allowlist permits only github-owned + ossf/scorecard-action + dependabot
      # (a non-owner toolchain action fails the workflow at startup).
      - name: Set up Rust (stable + target + components)
        run: |
          rustup toolchain install stable --profile minimal --component clippy --component rustfmt --no-self-update
          rustup default stable
          rustup target add ${{ matrix.target }}
      - name: Install musl linker
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --target ${{ matrix.target }} -- -D warnings
      - run: cargo test --target ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Verify Linux binary is static
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          BIN=target/x86_64-unknown-linux-musl/release/svgedit
          file "$BIN"
          ldd "$BIN" || true   # ldd exits nonzero on a fully-static binary -- that is the goal
