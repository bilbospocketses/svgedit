# CI: build + unit on every push/PR, then e2e shards in parallel.
#
# Three jobs:
#   build-and-unit  -- lint, typecheck, build, vitest, upload dist/editor artifact
#   e2e-chromium    -- download artifact, install chromium, run e2e --project chromium
#   e2e-firefox     -- download artifact, install firefox, run e2e --project firefox
#
# The master branch ruleset requires all three job contexts.
# All actions pinned to commit SHAs per sha_pinning_required enforcement.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build-and-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --build

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npx vitest run

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-editor
          path: dist/editor/
          retention-days: 1

  e2e-chromium:
    needs: build-and-unit
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist-editor
          path: dist/editor/

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: E2e tests (chromium)
        run: npx playwright test --project chromium

  e2e-firefox:
    needs: build-and-unit
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist-editor
          path: dist/editor/

      - name: Install Playwright firefox
        run: npx playwright install --with-deps firefox

      - name: E2e tests (firefox)
        run: npx playwright test --project firefox
