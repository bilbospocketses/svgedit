# CI: build + test on every push to master and every PR targeting master.
#
# This workflow enables the `required_status_checks` rule on the master branch
# ruleset (rule references the `build-and-test` job context). Without this
# workflow existing and running, the rule would block ALL pushes to master
# because the required check would never report.
#
# All actions are pinned to commit SHAs per the repo-level
# `sha_pinning_required` enforcement. Trailing `# v...` comments preserve
# human-readable version context.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --build

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npx vitest run

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: E2e tests
        run: npx tsx scripts/run-e2e.ts
