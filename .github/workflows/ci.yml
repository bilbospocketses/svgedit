# CI: build + unit on every push/PR, then e2e shards in parallel.
#
# Three jobs:
#   build-and-unit  -- lint, typecheck, build, vitest, upload dist/editor artifact
#   e2e-chromium    -- download artifact, run e2e --project chromium (in Playwright container)
#   e2e-firefox     -- download artifact, run e2e --project firefox (in Playwright container)
#
# The master branch ruleset requires all three job contexts.
# All actions pinned to commit SHAs per sha_pinning_required enforcement.
#
# The e2e jobs run inside the official Playwright Docker image, which ships
# with browsers pre-installed. This sidesteps the `playwright install` flow
# which has been intermittently hanging on GitHub-hosted runners (download
# reaches 100% then freezes for 60 min).

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

# Cancel a PR's superseded in-progress run when new commits are pushed; never
# cancel master-push runs (they feed the required contexts and are the source
# of truth). #130.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --build

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npx vitest run

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-editor
          path: dist/editor/
          retention-days: 1

  e2e-chromium:
    needs: build-and-unit
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.57.0-noble
    timeout-minutes: 60
    env:
      # Firefox refuses to launch when $HOME isn't owned by the current user
      # (Playwright-in-Docker quirk). Setting HOME=/root sidesteps it.
      # Chromium doesn't need this but we set it on both jobs for symmetry.
      HOME: /root
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist-editor
          path: dist/editor/

      - name: E2e tests (chromium)
        run: npx playwright test --project chromium

  e2e-firefox:
    needs: build-and-unit
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.57.0-noble
    timeout-minutes: 60
    env:
      # Firefox refuses to launch when $HOME isn't owned by the current user
      # (Playwright-in-Docker quirk). Setting HOME=/root sidesteps it.
      HOME: /root
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist-editor
          path: dist/editor/

      - name: E2e tests (firefox)
        run: npx playwright test --project firefox
