# OpenSSF Scorecard — weekly supply-chain security scoring.
#
# Scores the repo on the OSSF Scorecard check suite (Branch-Protection,
# Code-Review, Dangerous-Workflow, Dependency-Update-Tool, Maintained,
# Pinned-Dependencies, SAST, Security-Policy, Signed-Releases,
# Token-Permissions, etc.) and uploads SARIF to the Security tab so findings
# sit next to CodeQL alerts.
#
# Cadence: weekly cron matches dependabot.yml + GitHub-managed CodeQL default
# setup (Monday 09:00 ET / 13:00 UTC during DST). branch_protection_rule
# trigger fires on ruleset changes — catches regressions in the master ruleset
# automatically. Push trigger means score reflects the latest master commit.
#
# All actions SHA-pinned per repo-level sha_pinning_required. Comments are
# precise (# vX.Y.Z) so Dependabot's github-actions ecosystem can track future
# bumps — bare-major comments (# v4) are a documented Dependabot blind spot
# (originally hit on actions/upload-artifact in the cross-repo hardening
# sweep; svgedit avoids the trap from day one).
#
# Allowlist note: repo runs allowed_actions=selected. ossf/scorecard-action@*
# is on the explicit patterns_allowed list (added in the same PR that
# introduced this workflow); github/codeql-action/* is covered by
# github_owned_allowed=true.

name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: '0 13 * * 1'
  push:
    branches: [master]
  # PR trigger present from initial workflow add — the master branch ruleset
  # gates merge on `Scorecard analysis`, so the check must fire on PRs or
  # merges would block forever. Same-repo PRs resolve their workflow trigger
  # from the head-branch's workflow file, so this trigger takes effect from
  # this PR forward (Scorecard runs against the PR commit).
  pull_request:
    branches: [master]

permissions: read-all

# Cancel a PR's superseded in-progress run; never cancel push/schedule runs
# (they publish the score and feed the required Scorecard analysis context). #130.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # Upload SARIF results to the Security tab
      id-token: write          # OIDC for publish_results to api.securityscorecards.dev
      contents: read           # Read the checked-out repo
      actions: read            # Read workflow run metadata
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        # NOTE: pin to the COMMIT SHA, not the annotated-tag object SHA.
        # GitHub Actions runtime accepts either as a valid `uses:` ref, but
        # the OpenSSF webapp's publish_results verifier rejects tag-object
        # SHAs with "imposter commit: <sha> does not belong to
        # ossf/scorecard-action" — it checks the SHA against the repo's
        # commit graph, and annotated-tag objects are git objects of
        # type=tag, not type=commit. Use `gh api repos/ossf/scorecard-action
        # /git/tags/<tag-object-sha>` to dereference and extract `.object.sha`
        # for the underlying commit.
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishes the score to api.securityscorecards.dev so the public
          # https://scorecard.dev/viewer/?uri=github.com/<owner>/<repo> page
          # stays current. No PAT needed — uses OIDC via id-token: write above.
          # Gated to push events only — PR runs would publish a branch-HEAD
          # SHA that isn't on master yet, which the OpenSSF webapp verifier
          # would reject with the same "imposter commit" 400 pattern we hit
          # with the annotated-tag-object SHA in the cross-repo SHA-pin
          # hot-fix (different cause, same SHA-not-on-commit-graph failure
          # mode).
          publish_results: ${{ github.event_name == 'push' }}

      - name: Upload SARIF artifact (for run-level inspection)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to Security tab
        # Pin: COMMIT SHA dereferenced from annotated-tag object per
        # feedback_action_sha_pin_commit_not_tag_object.md. Comment is
        # PRECISE v4.35.5 per feedback_dependabot_precise_version_comment.md
        # — bare `# v4` would be a Dependabot blind spot for future major
        # bumps (v5+).
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
