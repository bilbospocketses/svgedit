# Browser canary -- early warning that an UPCOMING Chrome release may break the editor.
#
# Why this exists, and why NOT WPT: the Web Platform Tests suite verifies that the
# *browser* conforms to the SVG/DOM specs -- that's the browser vendor's job and is
# already run upstream against every Chromium release. Running it here would re-test
# Chromium, not svgedit. Instead this job re-runs *our own* e2e suite (which exercises
# the editor) against Chrome Beta -- the Chromium our users get in ~4-6 weeks -- so a
# regression that would actually break svgedit surfaces here BEFORE we bump the pinned
# CI browser. The pinned, blocking CI in ci.yml stays the source of truth; this is
# signal only.
#
# Chromium-only: Playwright ships its own patched Firefox that tracks Firefox *Stable*
# and cannot drive a branded/beta Firefox (there is no `firefox` channel, only
# `chrome*`/`msedge*`), so there is no Firefox-Beta lane to add here. Firefox is covered
# by the pinned e2e in ci.yml plus deliberate Playwright-version bumps.
#
# Non-blocking by construction: it runs on a schedule + manual dispatch, never on
# pull_request, so it is never a required status context and can never red-wall a merge.
# A failure here is a heads-up to investigate, not a gate.

name: Browser canary

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-chrome-beta:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Install Chrome Beta
        # Install via Google's apt repo, NOT `npx playwright install chrome-beta`, which
        # downloads the browser and intermittently hangs for the whole timeout on
        # GitHub-hosted runners (the flake ci.yml sidesteps with the Playwright container).
        # Playwright's `chrome-beta` channel then drives this system binary.
        run: |
          # dearmor as the runner user — `sudo gpg` fails with "cannot open /dev/tty" in the
          # no-tty CI shell; sudo is only needed for the privileged keyring write (tee).
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | gpg --dearmor | sudo tee /usr/share/keyrings/google-chrome.gpg > /dev/null
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] https://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-beta

      - name: Build
        run: npm run build

      - name: E2e against Chrome Beta (non-blocking signal)
        run: npx playwright test --project chromium
        env:
          CHROMIUM_CHANNEL: chrome-beta
