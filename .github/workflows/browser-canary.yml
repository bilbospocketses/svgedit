# Browser canary -- early warning that an UPCOMING Chrome release may break the editor.
#
# Why this exists, and why NOT WPT: the Web Platform Tests suite verifies that the
# *browser* conforms to the SVG/DOM specs -- that's the browser vendor's job and is
# already run upstream against every Chromium release. Running it here would re-test
# Chromium, not svgedit. Instead this job re-runs *our own* e2e suite (which exercises
# the editor) against Chrome Beta -- the Chromium our users get in ~4-6 weeks -- so a
# regression that would actually break svgedit surfaces here BEFORE we bump the pinned
# CI browser. The pinned, blocking CI in ci.yml stays the source of truth; this is
# signal only.
#
# Non-blocking by construction: it runs on a schedule + manual dispatch, never on
# pull_request, so it is never a required status context and can never red-wall a merge.
# A failure here is a heads-up to investigate, not a gate.

name: Browser canary

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-chrome-beta:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Install Chrome Beta
        run: npx playwright install --with-deps chrome-beta

      - name: Build
        run: npm run build

      - name: E2e against Chrome Beta (non-blocking signal)
        run: npx playwright test --project chromium
        env:
          CHROMIUM_CHANNEL: chrome-beta
